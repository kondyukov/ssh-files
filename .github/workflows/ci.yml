# Build and test on every platform we ship for; clippy on Linux.
# The toolchain is pinned (here and in rust-toolchain.toml) so the clippy
# gate cannot break from lints added in newer stables; bump both together.
# Actions are pinned to full SHAs (mutable tags are a supply-chain
# vector); dependabot keeps the pins fresh.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.97.0

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: 1.97.0
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # uninlined_format_args is allowed: the codebase consistently uses
      # positional format! style. Everything else is an error.
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings -A clippy::uninlined_format_args
