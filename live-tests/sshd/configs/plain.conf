# Standard server: pubkey only, exec allowed (streaming fast path works),
# TCP forwarding on (bastion/gateway roles rely on direct-tcpip).
Port 22
HostKey /keys/ssh_host_ed25519_key
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
AllowTcpForwarding yes
StrictModes yes
Subsystem sftp internal-sftp
