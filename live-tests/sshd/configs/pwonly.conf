# Password-only server: pubkey rejected, so the client's auth ladder must
# fall through keys and agent to the interactive password prompt.
# Credentials: test / pw-secret-1 (set in the Dockerfile).
Port 22
HostKey /keys/ssh_host_ed25519_key
PermitRootLogin no
PubkeyAuthentication no
PasswordAuthentication yes
KbdInteractiveAuthentication no
AllowTcpForwarding yes
StrictModes yes
Subsystem sftp internal-sftp
