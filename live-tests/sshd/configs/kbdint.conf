# Keyboard-interactive-only server (PAM): the common hardened-Linux
# reality - PasswordAuthentication off, PAM prompting via kbd-interactive.
# The client must run the prompt conversation; a plain password auth
# request is refused. Credentials: test / pw-secret-1.
Port 22
HostKey /keys/ssh_host_ed25519_key
PermitRootLogin no
PubkeyAuthentication no
PasswordAuthentication no
KbdInteractiveAuthentication yes
UsePAM yes
AllowTcpForwarding yes
StrictModes yes
Subsystem sftp internal-sftp
