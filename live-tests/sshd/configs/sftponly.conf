# Exec-restricted server: every session is forced into the SFTP subsystem,
# so the exec capability probe ("cat /dev/null") fails and ssh-files must
# fall back to the SFTP byte path ([sftp] in the status line).
Port 22
HostKey /keys/ssh_host_ed25519_key
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
AllowTcpForwarding no
StrictModes yes
Subsystem sftp internal-sftp
ForceCommand internal-sftp
